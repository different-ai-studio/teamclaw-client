name: AMUX
options:
  bundleIdPrefix: tech.teamclaw
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26"

packages:
  AMUXCore:
    path: Packages/AMUXCore
  AMUXUI:
    path: Packages/AMUXUI
  AMUXSharedUI:
    path: Packages/AMUXSharedUI
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

targets:
  AMUX:
    type: application
    platform: iOS
    sources:
      - path: AMUXApp
    dependencies:
      - package: AMUXCore
      - package: AMUXUI
      - package: AMUXSharedUI
      - package: Sentry
        product: SentrySwiftUI
    settings:
      base:
        INFOPLIST_FILE: AMUXApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: tech.teamclaw.mobile
        DEVELOPMENT_TEAM: 43G5A6G9QV
        MARKETING_VERSION: "1.0.6"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
