name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('daemon/Cargo.toml') }}

      - name: Build
        working-directory: daemon
        run: cargo build

      - name: Test
        working-directory: daemon
        run: cargo test

      - name: Clippy
        working-directory: daemon
        run: cargo clippy -- -D warnings

  macos-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install protoc + swift-protobuf
        run: brew install protobuf swift-protobuf

      - name: Generate Swift protos
        run: ./scripts/proto-gen-swift.sh

      - name: AMUXCore tests
        working-directory: ios/Packages/AMUXCore
        run: swift test
