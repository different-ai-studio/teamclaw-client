syntax = "proto3";
package teamclaw;

// --- Enums ---

enum SessionType {
  SESSION_TYPE_UNKNOWN = 0;
  CONTROL = 1;
  COLLAB = 2;
}

enum ActorType {
  ACTOR_TYPE_UNKNOWN = 0;
  HUMAN = 1;
  PERSONAL_AGENT = 2;
  ROLE_AGENT = 3;
}

enum MessageKind {
  MESSAGE_KIND_UNKNOWN = 0;
  TEXT = 1;
  SYSTEM = 2;
  WORK_EVENT = 3;
}

enum TaskStatus {
  TASK_STATUS_UNKNOWN = 0;
  OPEN = 1;
  IN_PROGRESS = 2;
  DONE = 3;
}

// --- Core Types ---

message Actor {
  string actor_id = 1;
  ActorType actor_type = 2;
  string display_name = 3;
  string owner_member_id = 4;
}

message SessionInfo {
  string session_id = 1;
  SessionType session_type = 2;
  string team_id = 3;
  string title = 4;
  string created_by = 5;
  int64 created_at = 6;
  repeated Participant participants = 7;
  string summary = 8;
  string primary_agent_id = 9;
  string task_id = 10;
  string last_message_preview = 11;
  int64 last_message_at = 12;
}

message Participant {
  string actor_id = 1;
  ActorType actor_type = 2;
  string display_name = 3;
  int64 joined_at = 4;
}

message Message {
  string message_id = 1;
  string session_id = 2;
  string sender_actor_id = 3;
  MessageKind kind = 4;
  string content = 5;
  int64 created_at = 6;
  string reply_to_message_id = 7;
  repeated string mentions = 8;
  string model = 9;
}

message Task {
  string task_id = 1;
  string session_id = 2;
  string title = 3;
  string description = 4;
  TaskStatus status = 5;
  string parent_id = 6;
  string created_by = 7;
  int64 created_at = 8;
  repeated Claim claims = 9;
  repeated Submission submissions = 10;
  bool archived = 11;
  string workspace_id = 12;
}

message Claim {
  string claim_id = 1;
  string task_id = 2;
  string actor_id = 3;
  int64 claimed_at = 4;
}

message Submission {
  string submission_id = 1;
  string task_id = 2;
  string actor_id = 3;
  string content = 4;
  int64 submitted_at = 5;
}

// --- MQTT Messages ---

message SessionMessageEnvelope {
  Message message = 1;
}

message TaskEvent {
  oneof event {
    Task created = 1;
    Task updated = 2;
    Claim claimed = 3;
    Submission submitted = 4;
  }
}

message LiveEventEnvelope {
  string event_id = 1;
  string event_type = 2;
  string session_id = 3;
  string actor_id = 4;
  int64 sent_at = 5;
  bytes body = 6;
}

message NotifyEnvelope {
  string event_id = 1;
  string event_type = 2;
  string target_device_id = 3;
  string session_id = 4;
  int64 sent_at = 5;
  string reason = 6;
}

// --- RPC ---

message RpcRequest {
  string request_id = 1;
  string sender_device_id = 2;
  oneof method {
    CreateSessionRequest create_session = 10;
    JoinSessionRequest join_session = 11;
    FetchSessionRequest fetch_session = 12;
    AddParticipantRequest add_participant = 13;
    RemoveParticipantRequest remove_participant = 14;
    CreateTaskRequest create_task = 15;
    ClaimTaskRequest claim_task = 16;
    SubmitTaskRequest submit_task = 17;
    UpdateTaskRequest update_task = 18;
    FetchSessionMessagesRequest fetch_session_messages = 20;
  }
}

message RpcResponse {
  string request_id = 1;
  bool success = 2;
  string error = 3;
  oneof result {
    SessionInfo session_info = 10;
    Task task = 11;
    Claim claim = 12;
    Submission submission = 13;
    SessionMessagePage session_message_page = 14;
  }
}

message CreateSessionRequest {
  SessionType session_type = 1;
  string team_id = 2;
  string title = 3;
  string summary = 4;
  repeated string invite_actor_ids = 5;
  string task_id = 6;
  // Canonical actor id of the creator. Prefer member_id for humans.
  // If empty, the daemon falls back to sender_device_id for backward compat.
  string sender_actor_id = 7;
}

message JoinSessionRequest {
  string session_id = 1;
  Participant participant = 2;
}

message FetchSessionRequest {
  string session_id = 1;
}

message FetchSessionMessagesRequest {
  string session_id = 1;
  int64 before_created_at = 2;
  uint32 page_size = 3;
}

message SessionMessagePage {
  string session_id = 1;
  repeated Message messages = 2;
  bool has_more = 3;
  int64 next_before_created_at = 4;
}

message AddParticipantRequest {
  string session_id = 1;
  Participant participant = 2;
}

message RemoveParticipantRequest {
  string session_id = 1;
  string actor_id = 2;
}

message CreateTaskRequest {
  string session_id = 1;
  string title = 2;
  string description = 3;
  string parent_id = 4;
  // Member id of the actor creating this task. Used by the daemon as
  // `created_by`; if empty, the daemon falls back to sender_device_id.
  string sender_actor_id = 5;
  string workspace_id = 6;
}

message ClaimTaskRequest {
  string session_id = 1;
  string task_id = 2;
  // Canonical actor id of the claimant. Prefer member_id for humans.
  // If empty, the daemon falls back to sender_device_id for backward compat.
  string sender_actor_id = 3;
}

message SubmitTaskRequest {
  string session_id = 1;
  string task_id = 2;
  string content = 3;
  // Canonical actor id of the submitter. Prefer member_id for humans.
  // If empty, the daemon falls back to sender_device_id for backward compat.
  string sender_actor_id = 4;
}

message UpdateTaskRequest {
  string session_id = 1;
  string task_id = 2;
  TaskStatus status = 3;
  string title = 4;
  string description = 5;
  optional bool archived = 6;
}
