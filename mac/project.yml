name: AMUXMac
options:
  bundleIdPrefix: tech.teamclaw
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26"

packages:
  AMUXCore:
    path: ../ios/Packages/AMUXCore
  AMUXMacUI:
    path: Packages/AMUXMacUI

targets:
  AMUXMac:
    type: application
    platform: macOS
    sources:
      - path: AMUXMacApp
    dependencies:
      - package: AMUXCore
      - package: AMUXMacUI
    info:
      path: AMUXMacApp/Info.plist
      properties:
        CFBundleName: AMUX
        CFBundleDisplayName: AMUX
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "© 2026 Shenzhen Miaoxing Information Technology Co., Ltd"
        NSMicrophoneUsageDescription: "AMUX uses the microphone for voice-to-text composition in the message composer."
        NSSpeechRecognitionUsageDescription: "AMUX transcribes spoken input on-device into the message composer."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.teamclaw.mac
        DEVELOPMENT_TEAM: 43G5A6G9QV
        CODE_SIGN_ENTITLEMENTS: AMUXMacApp/AMUXMac.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        ENABLE_PREVIEWS: YES
